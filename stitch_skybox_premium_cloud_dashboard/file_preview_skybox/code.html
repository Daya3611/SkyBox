<body class="bg-surface text-on-surface h-screen w-screen overflow-hidden flex flex-col antialiased">
<!-- Mock Background (File Explorer underneath the modal) -->
<div class="absolute inset-0 bg-surface-container-low p-md grid grid-cols-4 gap-md opacity-20 pointer-events-none">
<!-- Mock files for visual depth behind the modal -->
<div class="bg-surface rounded-xl p-md border border-outline-variant/30 h-48 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-[48px]">folder</span>
</div>
<div class="bg-surface rounded-xl p-md border border-outline-variant/30 h-48 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-[48px]">folder</span>
</div>
<div class="bg-surface rounded-xl p-md border border-outline-variant/30 h-48 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-[48px]">image</span>
</div>
<div class="bg-surface rounded-xl p-md border border-outline-variant/30 h-48 flex items-center justify-center">
<span class="material-symbols-outlined text-outline text-[48px]">description</span>
</div>
</div>
<!-- Overlay Modal Full Screen -->
<div class="fixed inset-0 z-50 flex bg-inverse-surface/90 backdrop-blur-xl transition-opacity duration-300">
<!-- Main Content Area (Image Viewer) -->
<div class="flex-1 flex flex-col relative h-full">
<!-- Header -->
<header class="flex justify-between items-center p-md bg-transparent absolute top-0 w-full z-10">
<div class="flex items-center gap-sm">
<button class="p-sm rounded-full text-on-primary hover:bg-surface-dim/20 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-title-md text-title-md text-on-primary truncate max-w-md">Summer_Trip_2024.jpg</h1>
</div>
<div class="flex items-center gap-xs">
<button class="p-sm rounded-full text-on-primary hover:bg-surface-dim/20 transition-colors flex items-center justify-center group relative">
<span class="material-symbols-outlined">share</span>
<span class="absolute top-full mt-1 bg-surface text-on-surface font-label-sm text-label-sm px-2 py-1 rounded shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">Share</span>
</button>
<button class="p-sm rounded-full text-on-primary hover:bg-surface-dim/20 transition-colors flex items-center justify-center group relative">
<span class="material-symbols-outlined">download</span>
<span class="absolute top-full mt-1 bg-surface text-on-surface font-label-sm text-label-sm px-2 py-1 rounded shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">Download</span>
</button>
<button class="p-sm rounded-full text-on-primary hover:bg-surface-dim/20 transition-colors flex items-center justify-center group relative">
<span class="material-symbols-outlined">delete</span>
<span class="absolute top-full mt-1 bg-error text-on-error font-label-sm text-label-sm px-2 py-1 rounded shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">Delete</span>
</button>
<div class="w-px h-6 bg-outline-variant/30 mx-sm"></div>
<button class="p-sm rounded-full text-on-primary hover:bg-surface-dim/20 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<!-- Image Canvas -->
<div class="flex-1 flex items-center justify-center p-xl relative overflow-hidden group">
<img alt="Preview" class="max-w-full max-h-full object-contain drop-shadow-2xl transition-transform duration-300 ease-out cursor-zoom-in hover:scale-105" data-alt="A stunning, high-resolution photograph of a vibrant summer landscape. The scene features lush green hills rolling under a clear, bright blue sky with a few fluffy white clouds. The lighting is sunny and optimistic, reflecting a joyful and energetic mood. The image is crisp, detailed, and perfectly captures the essence of a beautiful summer day trip, fitting the Aero-Minimalism aesthetic with its bright, airy feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGiXn_MTd3rycJ6QY8XmA7Ysj920jbkrshJ4OrVZJcgLKp0kRawL53iVoV8lYWLU2ttwqe8tQSAbI4GmvrCEBLB4j_4TfAQT429bS_XcC2cc3UdpQ85SFGT4_vWQVoqkfqXsCcf0el_trZMshxHT8Gk9eXWHGdxpUfyvo5XnHyTs8bJHgb3NBJ8AXYnC6t6OEgHVG4xxdsDCaLqurXvq0phyn_cEfdmj1aJ90ZVo2Es0CeYtfmcYrhE2d06Z7fv30Q4yWNPMZovV6w"/>
<!-- Zoom Controls Floating -->
<div class="absolute bottom-xl left-1/2 -translate-x-1/2 flex items-center bg-surface/10 backdrop-blur-md rounded-full border border-surface/20 p-xs opacity-0 group-hover:opacity-100 transition-opacity duration-300 shadow-lg">
<button class="p-sm rounded-full text-on-primary hover:bg-surface/20 transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-label-md text-label-md text-on-primary px-sm">100%</span>
<button class="p-sm rounded-full text-on-primary hover:bg-surface/20 transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- Footer Navigation -->
<footer class="absolute inset-y-0 left-0 right-0 flex items-center justify-between px-md pointer-events-none z-10">
<button class="p-md rounded-full bg-surface/10 backdrop-blur-md text-on-primary border border-surface/20 hover:bg-surface/20 transition-colors pointer-events-auto shadow-lg backdrop-blur-12px">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="p-md rounded-full bg-surface/10 backdrop-blur-md text-on-primary border border-surface/20 hover:bg-surface/20 transition-colors pointer-events-auto shadow-lg backdrop-blur-12px">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</footer>
</div>
<!-- Right Sidebar (Details) -->

<div class="p-md border-b border-outline-variant/30 flex justify-between items-center">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">info</span>
</button>
</div>

<div class="flex-1 overflow-y-auto p-md flex flex-col gap-xl custom-scrollbar">

<section>
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-wider mb-sm">Details</h3>
<ul class="flex flex-col gap-sm">
<li class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Size</span>
<span class="font-body-md text-body-md text-on-surface font-medium">4.2 MB</span>
</li>
<li class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Type</span>
<span class="font-body-md text-body-md text-on-surface font-medium">JPEG Image</span>
</li>
<li class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Dimensions</span>
<span class="font-body-md text-body-md text-on-surface font-medium">4032 × 3024</span>
</li>
<li class="flex justify-between items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Modified</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Aug 12, 2024</span>
</li>
</ul>
</section>
<div class="h-px bg-outline-variant/30 w-full"></div>
<!-- Access Section -->
<section>
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-wider mb-sm">Who has access</h3>
<div class="flex items-center justify-between p-sm rounded-lg hover:bg-surface-container-low transition-colors cursor-pointer">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-title-md text-title-md">
                                A
                            </div>
<div class="flex flex-col">
<span class="font-body-md text-body-md text-on-surface font-medium">Alex Morgan</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Owner</span>
</div>
</div>
</div>
</section>
</div>
</aside>
</div>
